// === STATE ===
const STORAGE_KEY = 'supporters_freudental_v1';
const SYNC_KEY = 'supporters_freudental_sync_v1';
const PENDING_KEY = 'supporters_freudental_pending_v1';
let state = {
  members: [],         // [{id, name}]
  attendance: {},      // {matchId: [memberId, memberId, ...]}
  currentMatchId: null,
  filter: 'all',
  statFilter: 'all'
};
let syncConfig = {url:'', token:'', userName:'', autoSync:true};
let pendingOps = [];     // Operationen, die noch nicht in die Cloud geschoben wurden
let syncStatus = 'idle'; // idle | syncing | ok | error | offline
let lastSyncAt = null;
let lastSyncError = '';
let syncDebounceTimer = null;

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state.members = parsed.members || [];
      state.attendance = parsed.attendance || {};
    }
  }catch(e){console.error('Load failed',e)}
  try{
    const raw = localStorage.getItem(SYNC_KEY);
    if(raw) Object.assign(syncConfig, JSON.parse(raw));
  }catch(e){}
  try{
    const raw = localStorage.getItem(PENDING_KEY);
    if(raw) pendingOps = JSON.parse(raw) || [];
  }catch(e){}
  try{
    const ls = localStorage.getItem('supporters_freudental_lastsync_v1');
    if(ls) lastSyncAt = new Date(ls);
  }catch(e){}
}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({members:state.members, attendance:state.attendance}));
  }catch(e){toast('Speichern fehlgeschlagen')}
}
function saveSyncConfig(){
  try{ localStorage.setItem(SYNC_KEY, JSON.stringify(syncConfig)); }catch(e){}
}
function savePending(){
  try{ localStorage.setItem(PENDING_KEY, JSON.stringify(pendingOps)); }catch(e){}
}
function queueOp(op){
  pendingOps.push(op);
  savePending();
  if(syncConfig.url && syncConfig.autoSync){
    clearTimeout(syncDebounceTimer);
    syncDebounceTimer = setTimeout(()=>ui.sync(true), 600);
  }
  ui.updateSyncIndicator();
}

// === HELPERS ===
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const fmtDate = iso => {
  const d = new Date(iso);
  const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  return days[d.getDay()] + ', ' + String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
};
const fmtDateShort = iso => {
  const d = new Date(iso);
  return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.';
};
const typeBadge = t => ({BL:'badge-bl', DFB:'badge-dfb', EL:'badge-el', SC:'badge-sc'})[t];
const typeName = t => ({BL:'Bundesliga', DFB:'DFB-Pokal', EL:'Europa League', SC:'Supercup'})[t];
const initials = name => name.split(' ').filter(Boolean).map(p=>p[0]).join('').slice(0,2).toUpperCase();
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

  renderDashboard(){

    if(list.length===0){
      $('#upcoming-list').innerHTML = '<div class="empty"><div class="ic">&#9917;</div>Keine Spiele</div>';
    } else {
      $('#upcoming-list').innerHTML = list.map(m=>ui.matchCard(m)).join('') +

    }

    // Top fans
    const rank = ui.computeRanking('all');
    if(rank.length===0){
      $('#top-fans').innerHTML = '<div class="muted">Noch keine Mitglieder. Lege auf der Mitglieder-Seite welche an.</div>';
    } else {
      $('#top-fans').innerHTML = rank.slice(0,3).map((r,i)=>{
        const medal = ['gold','silver','bronze'][i];
        return `<div class="rank-row">
          <div class="rank-pos ${medal}">${i+1}</div>
          <div class="rank-info">
            <div class="rank-name">${escapeHtml(r.name)}</div>
            <div class="rank-detail"><span>&#127968; ${r.h}</span><span>&#9992; ${r.a}</span><span>${r.total} Spiele</span></div>
          </div>
          <div class="rank-quota">${r.quota}%</div>
        </div>`;
      }).join('');
    }
  },
  renderMatches(){
    const f = state.filter;
    let list = SCHEDULE.slice();
    if(['BL','DFB','EL','SC'].includes(f)) list = list.filter(m=>m.type===f);
    if(f==='H') list = list.filter(m=>m.loc==='H');
    if(f==='A') list = list.filter(m=>m.loc==='A');
    list.sort((a,b)=>a.date.localeCompare(b.date));
    $('#matches-list').innerHTML = list.map(m=>ui.matchCard(m)).join('');
  },
  matchCard(m){
    const att = (state.attendance[m.id]||[]).length;
    const matchTitle = m.loc==='H' ? `VfB Stuttgart - ${m.opp}` : `${m.opp} - VfB Stuttgart`;
    return `<div class="match" onclick="ui.openMatch('${m.id}')">
      <div class="match-hdr">
        <div class="match-date">${fmtDateShort(m.date)}</div>
        <div class="match-badge ${typeBadge(m.type)}">${typeName(m.type)}</div>
        <div class="match-loc ${m.loc==='H'?'h':'a'}">${m.loc==='H'?'HEIM':'AUSW.'}</div>
      </div>
      <div class="match-teams">${matchTitle}</div>
      <div class="match-stats">
        <span>${m.round}</span>
        <span class="attendance-pill ${att===0?'zero':''}">${att} Fan${att===1?'':'s'} dabei</span>
      </div>
    </div>`;
  },
  openMatch(id){
    state.currentMatchId = id;
    const m = SCHEDULE.find(x=>x.id===id);
    if(!m) return;
    const matchTitle = m.loc==='H' ? `VfB - ${m.opp}` : `${m.opp} - VfB`;
    $('#md-title').innerHTML = matchTitle;
    $('#md-meta').innerHTML = `${fmtDate(m.date)} &middot; ${typeName(m.type)} &middot; ${m.round} &middot; ${m.loc==='H'?'Heim':'Ausw&auml;rts'}`;
    ui.renderAttendance();
    ui.showPage('match-detail');
  },
  renderAttendance(){
    const id = state.currentMatchId;
    const present = state.attendance[id] || [];
    const total = state.members.length;
    $('#md-count').textContent = `${present.length} von ${total} anwesend`;
    if(total===0){
      $('#attend-list').innerHTML = '<div class="empty"><div class="ic">&#128101;</div>Bitte zuerst Mitglieder auf der Mitglieder-Seite anlegen.</div>';
      return;
    }
    const sorted = state.members.slice().sort((a,b)=>a.name.localeCompare(b.name,'de'));
    $('#attend-list').innerHTML = sorted.map(m=>{
      const on = present.includes(m.id);
      return `<div class="attend-row ${on?'on':''}" onclick="ui.toggleAttendance('${m.id}')">
        <div class="avatar">${initials(m.name)}</div>
        <div class="name">${escapeHtml(m.name)}</div>
        <div class="check">${on?'&#10003;':''}</div>
      </div>`;
    }).join('');
  },
  toggleAttendance(memberId){
    const id = state.currentMatchId;
    if(!state.attendance[id]) state.attendance[id] = [];
    const arr = state.attendance[id];
    const idx = arr.indexOf(memberId);
    if(idx>=0) arr.splice(idx,1); else arr.push(memberId);
    if(arr.length===0) delete state.attendance[id];
    saveState();
    queueOp({op:'setAttendance', matchId:id, memberIds:state.attendance[id]||[]});
    ui.renderAttendance();
  },
  markAll(on){
    const id = state.currentMatchId;
    if(on){
      state.attendance[id] = state.members.map(m=>m.id);
    } else {
      delete state.attendance[id];
    }
    saveState();
    queueOp({op:'setAttendance', matchId:id, memberIds:state.attendance[id]||[]});
    ui.renderAttendance();
    toast(on?'Alle als anwesend markiert':'Alle abgew&auml;hlt');
  },
  renderMembers(){
    if(state.members.length===0){
      $('#member-list').innerHTML = '<div class="empty"><div class="ic">&#128101;</div>Noch keine Mitglieder.<br>Tippe oben einen Namen ein und auf +</div>';
      return;
    }
    const sorted = state.members.slice().sort((a,b)=>a.name.localeCompare(b.name,'de'));
    $('#member-list').innerHTML = sorted.map(m=>{
      const games = Object.values(state.attendance).filter(a=>a.includes(m.id)).length;
      return `<div class="member">
        <div class="avatar">${initials(m.name)}</div>
        <div class="name">${escapeHtml(m.name)}</div>
        <div class="count">${games} Spiele</div>
        <button class="del" onclick="ui.removeMember('${m.id}')" title="L&ouml;schen">&times;</button>
      </div>`;
    }).join('');
  },
  addMember(){
    const inp = $('#newMemberName');
    const name = inp.value.trim();
    if(!name){toast('Bitte Name eingeben');return}
    if(state.members.some(m=>m.name.toLowerCase()===name.toLowerCase())){
      toast('Name existiert bereits');return;
    }
    const newM = {id:uid(), name};
    state.members.push(newM);
    inp.value = '';
    saveState();
    queueOp({op:'addMember', id:newM.id, name:newM.name});
    ui.renderMembers();
    toast(name + ' hinzugef&uuml;gt');
  },
  removeMember(id){
    const m = state.members.find(x=>x.id===id);
    if(!m) return;
    ui.confirm(`"${m.name}" wirklich entfernen?<br><span class="muted">Alle Anwesenheits-Eintr&auml;ge dieser Person werden ebenfalls gel&ouml;scht.</span>`, ()=>{
      state.members = state.members.filter(x=>x.id!==id);
      Object.keys(state.attendance).forEach(k=>{
        state.attendance[k] = state.attendance[k].filter(x=>x!==id);
        if(state.attendance[k].length===0) delete state.attendance[k];
      });
      saveState();
      queueOp({op:'removeMember', id});
      ui.renderMembers();
      toast('Gel&ouml;scht');
    });
  },
  computeRanking(filter){
    const matches = SCHEDULE.filter(m=>{
      if(filter==='H') return m.loc==='H';
      if(filter==='A') return m.loc==='A';
      if(['BL','DFB','EL','SC'].includes(filter)) return m.type===filter;
      return true;
    });
    const matchIds = matches.map(m=>m.id);
    const possible = matchIds.length;
    return state.members.map(mem=>{
      let h=0, a=0;
      matchIds.forEach(mid=>{
        if((state.attendance[mid]||[]).includes(mem.id)){
          const match = SCHEDULE.find(x=>x.id===mid);
          if(match.loc==='H') h++; else a++;
        }
      });
      const total = h+a;
      const quota = possible>0 ? Math.round(total/possible*100) : 0;
      return {id:mem.id, name:mem.name, h, a, total, quota, possible};
    }).sort((x,y)=>y.total-x.total || y.quota-x.quota || x.name.localeCompare(y.name,'de'));
  },
  renderStats(){
    const rank = ui.computeRanking(state.statFilter);
    if(rank.length===0){
      $('#ranking-list').innerHTML = '<div class="empty"><div class="ic">&#128202;</div>Keine Mitglieder vorhanden.</div>';

    const filterLabel = ({all:'Alle Wettbewerbe', H:'Heimspiele', A:'Ausw&auml;rtsspiele', BL:'Bundesliga', DFB:'DFB-Pokal', EL:'Europa League'})[state.statFilter];
    $('#ranking-list').innerHTML = `<div class="muted" style="margin-bottom:10px;padding:0 4px">${filterLabel} - ${possible} m&ouml;gliche Spiele</div>` +

  showSettings(){

      <div class="status-line"><span>Cloud-Sync</span><strong style="color:${syncOn?'#1f8a3a':'#999'}">${syncOn?'aktiv':'nicht eingerichtet'}</strong></div>
      <div class="status-line"><span>Letzter Sync</span><strong>${lastSyncTxt}</strong></div>
      <div class="status-line"><span>Offene &Auml;nderungen</span><strong>${pendingOps.length}</strong></div>
      <div style="margin-top:14px"></div>
      <button class="btn btn-block" onclick="ui.showSyncSettings()">&#9729; Cloud-Sync (Google Sheets) einrichten</button>

      <button class="btn btn-sec btn-block" onclick="ui.exportCsv()">&#128202; Statistik als CSV exportieren</button>

      </div>`;

  },
  showSyncSettings(){
    $('#modal-content').innerHTML = `
      <h3>Cloud-Sync einrichten</h3>
      <p class="muted" style="font-size:12px">Alle App-Instanzen mit derselben URL und demselben Token greifen auf dasselbe Google Sheet zu. So k&ouml;nnen mehrere Personen parallel erfassen.</p>
      <div class="form-group">
        <label>Apps Script Web-App URL</label>
        <input type="url" id="syncUrl" placeholder="https://script.google.com/macros/s/.../exec" value="${escapeHtml(syncConfig.url||'')}">
        <div class="hint">Aus der Apps Script Bereitstellung (siehe Anleitung)</div>
      </div>
      <div class="form-group">
        <label>Token (gemeinsames Passwort)</label>
        <input type="text" id="syncToken" placeholder="Dein selbst gew&auml;hltes Passwort" value="${escapeHtml(syncConfig.token||'')}">
        <div class="hint">Muss mit dem SECRET_TOKEN im Apps Script &uuml;bereinstimmen</div>
      </div>
      <div class="form-group">
        <label>Dein Name (f&uuml;r Verlauf)</label>
        <input type="text" id="syncUser" placeholder="z.B. Benjamin" value="${escapeHtml(syncConfig.userName||'')}" maxlength="40">
        <div class="hint">Wird im Verlaufs-Tab des Sheets protokolliert</div>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:13px;color:#222">
          <input type="checkbox" id="syncAuto" ${syncConfig.autoSync?'checked':''} style="width:auto"> Automatisch nach jeder &Auml;nderung synchronisieren
        </label>
      </div>
      <div class="row" style="margin-top:14px">
        <button class="btn btn-sec" onclick="ui.showSettings()">Zur&uuml;ck</button>
        <button class="btn" onclick="ui.saveSyncSettings()">Speichern &amp; Verbinden</button>
      </div>
      ${syncConfig.url ? `<button class="btn btn-sec btn-block" style="margin-top:10px;color:#c33;border-color:#fcc" onclick="ui.disconnectSync()">Verbindung trennen</button>` : ''}
    `;
    ui.openModal();
  },
  async saveSyncSettings(){
    const url = $('#syncUrl').value.trim();
    const token = $('#syncToken').value.trim();
    const userName = $('#syncUser').value.trim();
    const autoSync = $('#syncAuto').checked;
    if(!url || !token){ toast('URL und Token sind Pflichtfelder'); return; }
    if(!/^https:\/\/script\.google\.com\//.test(url)){
      toast('URL muss mit https://script.google.com/ beginnen'); return;
    }
    const wasNew = !syncConfig.url;
    syncConfig = {url, token, userName, autoSync};
    saveSyncConfig();
    ui.closeModal();
    toast('Verbinde...');
    // Beim ersten Verbinden den Nutzer fragen, welche Richtung
    if(wasNew && (state.members.length>0 || Object.keys(state.attendance).length>0)){
      // Lokale Daten vorhanden - fragen
      setTimeout(()=>ui.showInitialSyncChoice(), 200);
    } else {
      await ui.sync(false);
    }
  },
  showInitialSyncChoice(){
    $('#modal-content').innerHTML = `
      <h3>Erstmaliger Sync</h3>
      <p>Du hast bereits lokale Daten und verbindest dich mit der Cloud. Was soll passieren?</p>
      <button class="btn btn-block" onclick="ui.initialSync('push')">&#9650; Lokale Daten in Cloud hochladen</button>
      <div class="muted" style="font-size:11px;margin-bottom:14px">Verwende dies, wenn ihr neu startet und du der erste bist.</div>
      <button class="btn btn-sec btn-block" onclick="ui.initialSync('pull')">&#9660; Cloud-Daten herunterladen (lokal &uuml;berschreiben)</button>
      <div class="muted" style="font-size:11px;margin-bottom:14px">Verwende dies, wenn jemand anders bereits Daten hochgeladen hat.</div>
      <div class="row" style="margin-top:14px">
        <button class="btn btn-sec" onclick="ui.closeModal()">Sp&auml;ter entscheiden</button>
      </div>`;
    ui.openModal();
  },
  async initialSync(direction){
    ui.closeModal();
    if(direction==='push'){
      // Alle lokalen Daten als Operationen queuen
      pendingOps = [];
      state.members.forEach(m=>pendingOps.push({op:'addMember', id:m.id, name:m.name}));
      Object.keys(state.attendance).forEach(matchId=>{
        pendingOps.push({op:'setAttendance', matchId, memberIds:state.attendance[matchId]});
      });
      savePending();
      await ui.sync(false);
    } else {
      // Nur Pull - lokale Daten verwerfen
      pendingOps = [];
      savePending();
      await ui.sync(false);
    }
  },
  disconnectSync(){
    ui.confirm('Cloud-Sync wirklich trennen?<br><span class="muted">Lokale Daten bleiben erhalten. Du kannst dich sp&auml;ter wieder verbinden.</span>', ()=>{
      syncConfig = {url:'', token:'', userName:syncConfig.userName, autoSync:true};
      pendingOps = [];
      saveSyncConfig();
      savePending();
      lastSyncAt = null;
      try{ localStorage.removeItem('supporters_freudental_lastsync_v1'); }catch(e){}
      syncStatus = 'idle';
      ui.updateSyncIndicator();
      ui.closeModal();
      toast('Sync getrennt');
    });
  },
  async sync(silent){
    if(!syncConfig.url){
      if(!silent){
        ui.closeModal();
        ui.showSyncSettings();
      }
      return;
    }
    if(syncStatus==='syncing') return;
    syncStatus = 'syncing';
    ui.updateSyncIndicator();
    try{
      let response;
      const ops = pendingOps.slice();
      if(ops.length>0){
        response = await fetch(syncConfig.url, {
          method:'POST',
          body:JSON.stringify({token:syncConfig.token, userName:syncConfig.userName||'unbekannt', operations:ops}),
          headers:{'Content-Type':'text/plain;charset=utf-8'},
          redirect:'follow'
        });
      } else {
        response = await fetch(syncConfig.url + (syncConfig.url.indexOf('?')>=0?'&':'?') + 'token=' + encodeURIComponent(syncConfig.token), {redirect:'follow'});
      }
      if(!response.ok) throw new Error('HTTP ' + response.status);
      const data = await response.json();
      if(!data.ok) throw new Error(data.error || 'Unbekannter Fehler');
      // Server-State &uuml;bernehmen
      state.members = data.data.members || [];
      state.attendance = data.data.attendance || {};
      pendingOps = [];
      saveState();
      savePending();
      lastSyncAt = new Date();
      try{ localStorage.setItem('supporters_freudental_lastsync_v1', lastSyncAt.toISOString()); }catch(e){}
      syncStatus = 'ok';
      lastSyncError = '';
      if(!silent) toast('Synchronisiert &#10003;');
      // Aktive Seite neu rendern
      const active = document.querySelector('.page.active');
      if(active){
        const name = active.id.replace('page-','');
        if(name==='match-detail') ui.renderAttendance(); else ui.showPage(name);
      }
    }catch(err){
      syncStatus = 'error';
      lastSyncError = err.message || String(err);
      if(!silent) toast('Sync-Fehler: ' + lastSyncError);
      console.error('Sync error', err);
    }finally{
      ui.updateSyncIndicator();
    }
  },
  updateSyncIndicator(){
    const pill = $('#syncPill');
    const txt = $('#syncText');
    if(!syncConfig.url){
      pill.className = 'sync-pill';
      txt.textContent = 'Nicht verbunden';
      return;
    }
    pill.className = 'sync-pill ' + (syncStatus==='ok'?'ok':syncStatus==='syncing'?'syncing':syncStatus==='error'?'error':'offline');
    const pendCnt = pendingOps.length;
    if(syncStatus==='syncing') txt.textContent = 'Synchronisiere...';
    else if(syncStatus==='error') txt.textContent = 'Fehler - tippen';
    else if(pendCnt>0) txt.textContent = pendCnt + ' offen - tippen';
    else if(lastSyncAt){
      const diff = Math.round((Date.now()-lastSyncAt.getTime())/60000);
      if(diff<1) txt.textContent = 'Synchron';
      else if(diff<60) txt.textContent = 'Sync vor ' + diff + ' Min';
      else txt.textContent = 'Sync vor ' + Math.round(diff/60) + ' Std';
    }
    else txt.textContent = 'Verbunden';
  },
  exportData(){
    const data = JSON.stringify({version:1, exportedAt:new Date().toISOString(), members:state.members, attendance:state.attendance}, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'supporters-freudental-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('Export heruntergeladen');
  },
  importData(){
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.json,application/json';
    inp.onchange = e=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev=>{
        try{
          const data = JSON.parse(ev.target.result);
          if(!data.members || !data.attendance) throw new Error('invalid');
          ui.confirm('Aktuelle Daten werden &uuml;berschrieben. Fortfahren?', ()=>{
            state.members = data.members;
            state.attendance = data.attendance;
            saveState();
            ui.closeModal();
            ui.showPage('dashboard');
            toast('Import erfolgreich');
          });
        }catch(err){toast('Datei ung&uuml;ltig')}
      };
      reader.readAsText(file);
    };
    inp.click();
  },
  exportCsv(){
    const rank = ui.computeRanking('all');
    const rankH = ui.computeRanking('H');
    const rankA = ui.computeRanking('A');
    const hMap = {}, aMap = {};
    rankH.forEach(r=>hMap[r.id]=r);
    rankA.forEach(r=>aMap[r.id]=r);
    const lines = ['Name;Heimspiele;Auswärtsspiele;Gesamt;Quote in %'];
    rank.forEach(r=>{
      lines.push([r.name, hMap[r.id]?.total||0, aMap[r.id]?.total||0, r.total, r.quota].join(';'));
    });
    const blob = new Blob(['﻿' + lines.join('\n')], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'supporters-statistik-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    toast('CSV heruntergeladen');
  },
  clearAll(){
    ui.confirm('<strong>Wirklich alle Daten l&ouml;schen?</strong><br>Mitglieder und alle Anwesenheits-Eintr&auml;ge gehen verloren.<br><br>Tipp: Vorher Export machen!', ()=>{
      state.members = [];
      state.attendance = {};
      saveState();
      ui.closeModal();
      ui.showPage('dashboard');
      toast('Alle Daten gel&ouml;scht');
    });
  },
  confirm(html, onYes){
    $('#modal-content').innerHTML = `
      <h3>Best&auml;tigen</h3>
      <p>${html}</p>
      <div class="row">
        <button class="btn btn-sec" onclick="ui.closeModal()">Abbrechen</button>
        <button class="btn" id="modalConfirmBtn">OK</button>
      </div>`;
    $('#modalConfirmBtn').onclick = ()=>{ui.closeModal(); onYes();};
    ui.openModal();
  },
  openModal(){$('#modal-overlay').classList.add('show')},
  closeModal(){$('#modal-overlay').classList.remove('show')},
  installApp(){
    if(window._deferredPrompt){
      window._deferredPrompt.prompt();
      window._deferredPrompt = null;
      $('#installBanner').classList.remove('show');
    } else {
      ui.confirm('Auf Android: Browser-Men&uuml; (drei Punkte) &rarr; "Zum Startbildschirm hinzuf&uuml;gen".<br><br>Auf iOS: Teilen-Symbol &rarr; "Zum Home-Bildschirm".', ()=>{});
    }
  }
};

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}

// === EVENTS ===
$$('.tabbar button').forEach(b=>b.addEventListener('click',()=>ui.showPage(b.dataset.page)));
$$('#filter-chips .chip').forEach(c=>c.addEventListener('click',()=>{
  $$('#filter-chips .chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');
  state.filter = c.dataset.f;
  ui.renderMatches();
}));
$$('#page-stats .chip').forEach(c=>c.addEventListener('click',()=>{
  $$('#page-stats .chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');
  state.statFilter = c.dataset.stat;
  ui.renderStats();
}));
$('#newMemberName').addEventListener('keydown',e=>{if(e.key==='Enter')ui.addMember()});
$('#modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')ui.closeModal()});

// PWA-Installation: Android (beforeinstallprompt) + iOS (manueller Hinweis)
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  window._deferredPrompt = e;
  if(!isStandalone()) $('#installBanner').classList.add('show');
});

// iOS-Erkennung
function isIOS(){return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream}
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

// Auf iOS: Install-Banner nach kurzer Verzögerung anzeigen, wenn nicht installiert
if(isIOS() && !isStandalone() && !localStorage.getItem('install_dismissed')){
  setTimeout(()=>{
    const b = $('#installBanner');
    b.classList.add('show');
    const labelSpan = b.querySelector('span:nth-of-type(2)');
    if(labelSpan) labelSpan.textContent = 'Tippe unten auf Teilen und "Zum Home-Bildschirm" für Vollbild-Modus';
    const btn = b.querySelector('button');
    if(btn){
      btn.textContent = 'OK';
      btn.onclick = ()=>{localStorage.setItem('install_dismissed','1'); b.classList.remove('show')};
    }
  }, 2000);
}

// Service Worker registrieren für Offline-Support
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(err=>console.log('SW-Fehler:', err));
  });
}

// In Standalone-Modus: externe Links im Browser öffnen (sonst springt iOS aus der App)
document.addEventListener('click', e=>{
  if(!isStandalone()) return;
  const a = e.target.closest('a');
  if(a && a.href && a.target !== '_self' && !a.href.startsWith(location.origin)){
    e.preventDefault();
    window.open(a.href, '_blank');
  }
});

// === INIT ===
loadState();
ui.showPage('dashboard');
ui.updateSyncIndicator();
// Beim Start automatisch synchronisieren, falls eingerichtet
if(syncConfig.url){
  setTimeout(()=>ui.sync(true), 800);
}
// Online/Offline-Erkennung
window.addEventListener('online', ()=>{ if(syncConfig.url) ui.sync(true); });
window.addEventListener('offline', ()=>{
  if(syncConfig.url){ syncStatus='offline'; ui.updateSyncIndicator(); }
});
// Beim Wiederfokussieren der App synchronisieren
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden && syncConfig.url){
    if(!lastSyncAt || (Date.now()-lastSyncAt.getTime())>30000){
      ui.sync(true);
    }
  }
});
</script>
</body>
</html>

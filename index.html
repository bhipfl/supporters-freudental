<script>
// === DATEN ===
// Spielpläne liegen in fixtures/*.json und werden zur Laufzeit geladen.
// type-Codes: BL=Bundesliga, DFB=DFB-Pokal, EL=Europa League, CL=Champions League, SC=Supercup
// loc: H=Heim, A=Auswärts
// match-IDs werden beim Laden mit dem Saison-Prefix kombiniert: "2526-bl1" usw.
let SEASONS = [];          // [{id, label, file, current}]
let SCHEDULES = {};        // {seasonId: [matchObjekte mit prefixed IDs]}
let SCHEDULE = [];         // Spiele der aktuell gewählten Saison (für Render-Logik)
const FALLBACK_SEASON_ID = '2526';

// === STATE ===
const STORAGE_KEY = 'supporters_freudental_v1';
const SYNC_KEY = 'supporters_freudental_sync_v1';
const PENDING_KEY = 'supporters_freudental_pending_v1';
const SEASON_KEY = 'supporters_freudental_season_v1';
const MIGRATION_KEY = 'supporters_freudental_migrated_v2';
const MEMBER_AUTH_KEY = 'supporters_freudental_member_auth_v1'; // {id, token, syncUrl}
let state = {
  members: [],         // [{id, name}]
  attendance: {},      // {matchId: [memberId, memberId, ...]}  matchId hat Saison-Prefix
  currentMatchId: null,
  seasonId: FALLBACK_SEASON_ID,
  filter: 'all',
  statFilter: 'all',
  role: 'guest',       // 'admin' | 'member' | 'guest' - wird im init() ermittelt
  myMemberId: null     // nur im Member-Modus gesetzt
};
// Member-Auth: gesetzt sobald per URL-Hash oder localStorage erkannt
let memberAuth = null; // {id, token, syncUrl}
let syncConfig = {url:'', token:'', userName:'', autoSync:true};
let pendingOps = [];     // Operationen, die noch nicht in die Cloud geschoben wurden
let syncStatus = 'idle'; // idle | syncing | ok | error | offline
let lastSyncAt = null;
let lastSyncError = '';
let syncDebounceTimer = null;

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state.members = parsed.members || [];
      state.attendance = parsed.attendance || {};
    }
  }catch(e){console.error('Load failed',e)}
  try{
    const raw = localStorage.getItem(SYNC_KEY);
    if(raw) Object.assign(syncConfig, JSON.parse(raw));
  }catch(e){}
  try{
    const raw = localStorage.getItem(PENDING_KEY);
    if(raw) pendingOps = JSON.parse(raw) || [];
  }catch(e){}
  try{
    const ls = localStorage.getItem('supporters_freudental_lastsync_v1');
    if(ls) lastSyncAt = new Date(ls);
  }catch(e){}
  try{
    const s = localStorage.getItem(SEASON_KEY);
    if(s) state.seasonId = s;
  }catch(e){}
  migrateAttendanceIds();
}

// Idempotente Migration: Attendance-Keys ohne Saison-Prefix bekommen
// '2526-' vorangestellt (alle Alt-Daten stammen aus Saison 2025/26).
// Wird beim Start und nach jedem Cloud-Pull aufgerufen. Konflikte werden
// per Set-Union gemerged, sodass keine Daten verloren gehen.
function migrateAttendanceIds(){
  try{
    const renamed = [];
    Object.keys(state.attendance).slice().forEach(key=>{
      if(key.includes('-')) return;
      const newKey = FALLBACK_SEASON_ID + '-' + key;
      const oldList = state.attendance[key] || [];
      if(state.attendance[newKey]){
        state.attendance[newKey] = Array.from(new Set([...(state.attendance[newKey]||[]), ...oldList]));
      } else {
        state.attendance[newKey] = oldList;
      }
      delete state.attendance[key];
      renamed.push(newKey);
    });
    if(renamed.length>0){
      saveState();
      renamed.forEach(k=>{
        pendingOps.push({op:'setAttendance', matchId:k, memberIds:state.attendance[k]});
      });
      savePending();
    }
    localStorage.setItem(MIGRATION_KEY, '1');
  }catch(e){console.error('Migration failed', e)}
}

function saveSeasonChoice(){
  try{ localStorage.setItem(SEASON_KEY, state.seasonId); }catch(e){}
}

// Liest #u=...&t=...&s=... aus der URL und schreibt es in localStorage,
// dann säubert den Hash. Returns true wenn neue Auth aufgenommen wurde.
function captureMemberAuthFromUrl(){
  if(!location.hash || location.hash.length < 2) return false;
  const params = new URLSearchParams(location.hash.slice(1));
  const u = params.get('u');
  const t = params.get('t');
  const s = params.get('s');
  if(!u || !t) return false;
  const auth = {id: u, token: t, syncUrl: s || ''};
  try{ localStorage.setItem(MEMBER_AUTH_KEY, JSON.stringify(auth)); }catch(e){}
  // Hash entfernen damit Token nicht im Browser-Verlauf bleibt
  try{ history.replaceState({}, '', location.pathname + location.search); }catch(e){}
  return true;
}

function loadMemberAuth(){
  try{
    const raw = localStorage.getItem(MEMBER_AUTH_KEY);
    if(raw) memberAuth = JSON.parse(raw);
  }catch(e){ memberAuth = null; }
}

function clearMemberAuth(){
  memberAuth = null;
  try{ localStorage.removeItem(MEMBER_AUTH_KEY); }catch(e){}
}

// Aktive Identität ermitteln. Member-Auth hat Vorrang vor Admin-Sync-Config.
function detectRole(){
  if(memberAuth && memberAuth.id && memberAuth.token){
    state.role = 'member';
    state.myMemberId = memberAuth.id;
  } else if(syncConfig.url && syncConfig.token){
    state.role = 'admin';
    state.myMemberId = null;
  } else {
    state.role = 'guest';
    state.myMemberId = null;
  }
}

// Liefert das passende Sync-Setup für den aktuellen Modus.
// Im Member-Modus kommt URL und Token aus der memberAuth, im Admin-Modus aus syncConfig.
function activeSync(){
  if(state.role === 'member' && memberAuth){
    return {
      url: memberAuth.syncUrl || syncConfig.url,
      token: memberAuth.token,
      userName: '', // wird im POST überschrieben, irrelevant
      autoSync: true
    };
  }
  return syncConfig;
}

// Lädt fixtures/index.json + alle dort referenzierten Spielpläne.
// Match-IDs werden mit Saison-Prefix versehen (bl1 → 2526-bl1).
async function loadFixtures(){
  try{
    const idxResp = await fetch('fixtures/index.json', {cache:'no-cache'});
    if(!idxResp.ok) throw new Error('Index-Datei nicht erreichbar');
    const idx = await idxResp.json();
    SEASONS = idx.seasons || [];
    SCHEDULES = {};
    await Promise.all(SEASONS.map(async s=>{
      try{
        const r = await fetch(s.file, {cache:'no-cache'});
        if(!r.ok){ SCHEDULES[s.id] = []; return; }
        const data = await r.json();
        const prefix = s.id + '-';
        SCHEDULES[s.id] = (data.matches||[]).map(m=>Object.assign({}, m, {id: prefix + m.id}));
      }catch(err){
        console.warn('Spielplan ' + s.id + ' konnte nicht geladen werden', err);
        SCHEDULES[s.id] = [];
      }
    }));
    // Gewählte Saison auf gültigen Wert sicherstellen
    if(!SEASONS.some(s=>s.id===state.seasonId)){
      const cur = SEASONS.find(s=>s.current) || SEASONS[0];
      if(cur) state.seasonId = cur.id;
    }
    SCHEDULE = SCHEDULES[state.seasonId] || [];
  }catch(err){
    console.error('Fixtures konnten nicht geladen werden', err);
    SEASONS = [];
    SCHEDULES = {};
    SCHEDULE = [];
  }
}

function setSeason(seasonId){
  if(!SCHEDULES[seasonId]) return;
  state.seasonId = seasonId;
  SCHEDULE = SCHEDULES[seasonId];
  saveSeasonChoice();
  // Beide Selects synchron halten, falls die Änderung programmatisch erfolgte
  const s1 = document.getElementById('seasonSelect');
  const s2 = document.getElementById('seasonSelectStats');
  if(s1 && s1.value !== seasonId) s1.value = seasonId;
  if(s2 && s2.value !== seasonId) s2.value = seasonId;
  ui.renderHeaderSeason();
  ui.renderFilterChips();
  ui.renderStatChips();
  ui.renderMatches();
  ui.renderDashboard();
  ui.renderStats();
}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({members:state.members, attendance:state.attendance}));
  }catch(e){toast('Speichern fehlgeschlagen')}
}
function saveSyncConfig(){
  try{ localStorage.setItem(SYNC_KEY, JSON.stringify(syncConfig)); }catch(e){}
}
function savePending(){
  try{ localStorage.setItem(PENDING_KEY, JSON.stringify(pendingOps)); }catch(e){}
}
function queueOp(op){
  pendingOps.push(op);
  savePending();
  const a = activeSync();
  if(a.url && a.autoSync){
    clearTimeout(syncDebounceTimer);
    syncDebounceTimer = setTimeout(()=>ui.sync(true), 600);
  }
  ui.updateSyncIndicator();
}

// Wendet eine Operation lokal an - exakt gleiche Semantik wie das Apps Script.
// Wird benutzt, um nach einem Server-Pull noch nicht gesendete Ops "nachzulegen",
// damit die UI nicht zwischen Tap und Sync-Antwort zurückspringt.
function applyOpLocally(op){
  if(!op || !op.op) return;
  if(op.op === 'addMember'){
    if(!state.members.some(m => m.id === op.id)){
      state.members.push({id: op.id, name: op.name});
    } else {
      state.members = state.members.map(m => m.id === op.id ? {id: op.id, name: op.name} : m);
    }
  } else if(op.op === 'removeMember'){
    state.members = state.members.filter(m => m.id !== op.id);
    Object.keys(state.attendance).forEach(k => {
      state.attendance[k] = state.attendance[k].filter(x => x !== op.id);
      if(state.attendance[k].length === 0) delete state.attendance[k];
    });
  } else if(op.op === 'setAttendance'){
    if(op.memberIds && op.memberIds.length > 0){
      state.attendance[op.matchId] = op.memberIds.slice();
    } else {
      delete state.attendance[op.matchId];
    }
  } else if(op.op === 'setSelfAttendance'){
    // Welche memberId? Im Member-Modus ist es state.myMemberId.
    // Im Admin-Fall (sollte selten vorkommen) wird sie aus der Op übernommen.
    const memberId = state.role === 'member' ? state.myMemberId : op.memberId;
    if(!memberId) return;
    if(!state.attendance[op.matchId]) state.attendance[op.matchId] = [];
    const arr = state.attendance[op.matchId];
    const idx = arr.indexOf(memberId);
    if(op.present && idx < 0) arr.push(memberId);
    if(!op.present && idx >= 0) arr.splice(idx, 1);
    if(arr.length === 0) delete state.attendance[op.matchId];
  }
}

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const fmtDate = iso => {
  const d = new Date(iso);
  const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  return days[d.getDay()] + ', ' + String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
};
const fmtDateShort = iso => {
  const d = new Date(iso);
  return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.';
};
const COMP_TYPES = ['BL','DFB','EL','CL','SC'];
const typeBadge = t => ({BL:'badge-bl', DFB:'badge-dfb', EL:'badge-el', CL:'badge-cl', SC:'badge-sc'})[t] || 'badge-bl';
const typeName = t => ({BL:'Bundesliga', DFB:'DFB-Pokal', EL:'Europa League', CL:'Champions League', SC:'Supercup'})[t] || t;
const typeShort = t => ({BL:'Bundesliga', DFB:'DFB-Pokal', EL:'Europa', CL:'Champions', SC:'Supercup'})[t] || t;
const initials = name => name.split(' ').filter(Boolean).map(p=>p[0]).join('').slice(0,2).toUpperCase();
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

  renderAttendance(){

      $('#attend-list').innerHTML = '<div class="empty"><div class="ic">&#128101;</div>Bitte zuerst Mitglieder auf der Mitglieder-Seite anlegen.</div>';

    }
    const sorted = state.members.slice().sort((a,b)=>a.name.localeCompare(b.name,'de'));

      if(on) cls.push('on');
      if(isMember && !isSelf) cls.push('readonly');
      if(isSelf) cls.push('self');
      const click = interactive ? `onclick="ui.toggleAttendance('${m.id}')"` : '';
      const namePart = isSelf ? `${escapeHtml(m.name)} <span class="self-tag">du</span>` : escapeHtml(m.name);
      return `<div class="${cls.join(' ')}" ${click}>
        <div class="avatar">${initials(m.name)}</div>
        <div class="name">${namePart}</div>
        <div class="check">${on?'&#10003;':''}</div>
      </div>`;

  },
  toggleAttendance(memberId){
    // Member-Modus: nur eigene Anwesenheit toggeln, andere ignorieren
    if(state.role === 'member' && memberId !== state.myMemberId) return;
    const id = state.currentMatchId;
    if(!state.attendance[id]) state.attendance[id] = [];
    const arr = state.attendance[id];
    const idx = arr.indexOf(memberId);
    const willBePresent = idx < 0;
    if(idx>=0) arr.splice(idx,1); else arr.push(memberId);
    if(arr.length===0) delete state.attendance[id];
    saveState();
    if(state.role === 'member'){
      // Diff-basierte Op - sicher gegen Race und respektiert Server-Auth
      queueOp({op:'setSelfAttendance', matchId:id, present:willBePresent});
    } else {
      queueOp({op:'setAttendance', matchId:id, memberIds:state.attendance[id]||[]});
    }
    ui.renderAttendance();
  },
  markAll(on){
    if(state.role === 'member') return; // im Member-Modus nicht erlaubt

    } else {
      delete state.attendance[id];

    saveState();
    queueOp({op:'setAttendance', matchId:id, memberIds:state.attendance[id]||[]});

  addMember(){

  removeMember(id){
    if(state.role === 'member') return;
    const m = state.members.find(x=>x.id===id);
    if(!m) return;
    ui.confirm(`"${m.name}" wirklich entfernen?<br><span class="muted">Alle Anwesenheits-Eintr&auml;ge dieser Person werden ebenfalls gel&ouml;scht.</span>`, ()=>{
      state.members = state.members.filter(x=>x.id!==id);
      Object.keys(state.attendance).forEach(k=>{
        state.attendance[k] = state.attendance[k].filter(x=>x!==id);
        if(state.attendance[k].length===0) delete state.attendance[k];
      });
      saveState();
      queueOp({op:'removeMember', id});
      ui.renderMembers();
      toast('Gel&ouml;scht');
    });
  },
  computeRanking(filter){
    const matches = SCHEDULE.filter(m=>{
      if(filter==='H') return m.loc==='H';
      if(filter==='A') return m.loc==='A';
      if(COMP_TYPES.includes(filter)) return m.type===filter;
      return true;
    });
    const matchIds = matches.map(m=>m.id);
    const possible = matchIds.length;
    const locById = {};
    matches.forEach(m=>locById[m.id]=m.loc);
    return state.members.map(mem=>{
      let h=0, a=0;
      matchIds.forEach(mid=>{
        if((state.attendance[mid]||[]).includes(mem.id)){
          if(locById[mid]==='H') h++; else a++;
        }
      });
      const total = h+a;
      const quota = possible>0 ? Math.round(total/possible*100) : 0;
      return {id:mem.id, name:mem.name, h, a, total, quota, possible};
    }).sort((x,y)=>y.total-x.total || y.quota-x.quota || x.name.localeCompare(y.name,'de'));
  },
  renderStats(){
    if(SCHEDULE.length===0){
      $('#ranking-list').innerHTML = ui.seasonEmptyHtml();
      return;
    }
    const rank = ui.computeRanking(state.statFilter);
    if(rank.length===0){
      $('#ranking-list').innerHTML = '<div class="empty"><div class="ic">&#128202;</div>Keine Mitglieder vorhanden.</div>';
      return;
    }
    const possible = rank[0]?.possible || 0;
    const filterLabel = ({all:'Alle Wettbewerbe', H:'Heimspiele', A:'Ausw&auml;rtsspiele', BL:'Bundesliga', DFB:'DFB-Pokal', EL:'Europa League', CL:'Champions League', SC:'Supercup'})[state.statFilter];
    $('#ranking-list').innerHTML = `<div class="muted" style="margin-bottom:10px;padding:0 4px">${filterLabel} - ${possible} m&ouml;gliche Spiele</div>` +
      rank.map((r,i)=>{
        const medal = i===0?'gold':i===1?'silver':i===2?'bronze':'';
        return `<div class="rank-row">
          <div class="rank-pos ${medal}">${i+1}</div>
          <div class="rank-info">
            <div class="rank-name">${escapeHtml(r.name)}</div>
            <div class="rank-detail"><span>&#127968; ${r.h} Heim</span><span>&#9992; ${r.a} Ausw.</span><span>${r.total} gesamt</span></div>
            <div class="rank-bar"><div class="rank-bar-fill" style="width:${r.quota}%"></div></div>
          </div>
          <div class="rank-quota">${r.quota}%</div>
        </div>`;
      }).join('');
  },
  showSettings(){
    if(state.role === 'member'){
      ui.showMemberSettings();
      return;
    }
    const total = state.members.length;
    const totalAtt = Object.values(state.attendance).reduce((s,a)=>s+a.length,0);
    const syncOn = !!syncConfig.url;
    const lastSyncTxt = lastSyncAt ? lastSyncAt.toLocaleString('de-DE') : 'noch nie';
    $('#modal-content').innerHTML = `
      <h3>Einstellungen &amp; Daten</h3>
      <div class="status-line"><span>Mitglieder</span><strong>${total}</strong></div>
      <div class="status-line"><span>Erfasste Spiele</span><strong>${Object.keys(state.attendance).length}</strong></div>
      <div class="status-line"><span>Anwesenheits-Eintr&auml;ge</span><strong>${totalAtt}</strong></div>
      <div class="status-line"><span>Cloud-Sync</span><strong style="color:${syncOn?'#1f8a3a':'#999'}">${syncOn?'aktiv':'nicht eingerichtet'}</strong></div>
      <div class="status-line"><span>Letzter Sync</span><strong>${lastSyncTxt}</strong></div>
      <div class="status-line"><span>Offene &Auml;nderungen</span><strong>${pendingOps.length}</strong></div>
      <div style="margin-top:14px"></div>
      <button class="btn btn-block" onclick="ui.showSyncSettings()">&#9729; Cloud-Sync (Google Sheets) einrichten</button>
      ${syncOn ? '<button class="btn btn-sec btn-block" onclick="ui.sync(false)">&#128260; Jetzt synchronisieren</button>' : ''}
      <hr>
      <button class="btn btn-sec btn-block" onclick="ui.exportData()">&#128190; Lokales Backup exportieren (JSON)</button>
      <button class="btn btn-sec btn-block" onclick="ui.importData()">&#128229; Backup importieren</button>
      <button class="btn btn-sec btn-block" onclick="ui.exportCsv()">&#128202; Statistik als CSV exportieren</button>
      <hr>
      <button class="btn btn-sec btn-block" style="color:#c33;border-color:#fcc" onclick="ui.clearAll()">Alle lokalen Daten zur&uuml;cksetzen</button>
      <hr>
      <div class="muted" style="font-size:11px;text-align:center">
        Spielpl&auml;ne: ${SEASONS.map(s=>escapeHtml(s.label)).join(', ') || '—'}<br>
        Ohne Cloud-Sync werden Daten nur lokal gespeichert.<br>
        Backup regelm&auml;&szlig;ig per Export sichern!
      </div>
      <div class="row" style="margin-top:14px">
        <button class="btn btn-sec" onclick="ui.closeModal()">Schlie&szlig;en</button>
      </div>`;
    ui.openModal();
  },
  showMemberSettings(){
    const me = state.members.find(m => m.id === state.myMemberId);
    const myMatchIds = SCHEDULE.map(m=>m.id);
    const myCount = myMatchIds.filter(id => (state.attendance[id]||[]).includes(state.myMemberId)).length;
    const lastSyncTxt = lastSyncAt ? lastSyncAt.toLocaleString('de-DE') : 'noch nie';
    $('#modal-content').innerHTML = `
      <h3>Mein Account</h3>
      <div class="status-line"><span>Name</span><strong>${escapeHtml(me ? me.name : 'unbekannt')}</strong></div>
      <div class="status-line"><span>Aktive Saison</span><strong>${escapeHtml((SEASONS.find(s=>s.id===state.seasonId)||{}).label || '—')}</strong></div>
      <div class="status-line"><span>Meine Spiele (Saison)</span><strong>${myCount} von ${myMatchIds.length}</strong></div>
      <div class="status-line"><span>Letzter Sync</span><strong>${lastSyncTxt}</strong></div>
      <div class="status-line"><span>Offene &Auml;nderungen</span><strong>${pendingOps.length}</strong></div>
      <div style="margin-top:14px"></div>
      <button class="btn btn-sec btn-block" onclick="ui.sync(false)">&#128260; Jetzt synchronisieren</button>
      <hr>
      <button class="btn btn-sec btn-block" style="color:#c33;border-color:#fcc" onclick="ui.logoutMember()">Abmelden &amp; lokale Daten l&ouml;schen</button>
      <div class="muted" style="font-size:11px;text-align:center;margin-top:10px">
        Du kannst dich nur f&uuml;r dich selbst eintragen.<br>
        Korrekturen an anderen Mitgliedern macht ein Admin.
      </div>
      <div class="row" style="margin-top:14px">
        <button class="btn btn-sec" onclick="ui.closeModal()">Schlie&szlig;en</button>
      </div>`;
    ui.openModal();
  },
  logoutMember(){
    ui.confirm('Wirklich abmelden?<br><span class="muted">Du brauchst dann erneut deinen pers&ouml;nlichen Vereins-Link, um dich wieder einzutragen.</span>', ()=>{
      clearMemberAuth();
      try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
      try{ localStorage.removeItem(PENDING_KEY); }catch(e){}
      location.reload();
    });
  },
  showSyncSettings(){
    $('#modal-content').innerHTML = `
      <h3>Cloud-Sync einrichten</h3>
      <p class="muted" style="font-size:12px">Alle App-Instanzen mit derselben URL und demselben Token greifen auf dasselbe Google Sheet zu. So k&ouml;nnen mehrere Personen parallel erfassen.</p>
      <div class="form-group">
        <label>Apps Script Web-App URL</label>
        <input type="url" id="syncUrl" placeholder="https://script.google.com/macros/s/.../exec" value="${escapeHtml(syncConfig.url||'')}">
        <div class="hint">Aus der Apps Script Bereitstellung (siehe Anleitung)</div>
      </div>
      <div class="form-group">
        <label>Token (gemeinsames Passwort)</label>
        <input type="text" id="syncToken" placeholder="Dein selbst gew&auml;hltes Passwort" value="${escapeHtml(syncConfig.token||'')}">
        <div class="hint">Muss mit dem SECRET_TOKEN im Apps Script &uuml;bereinstimmen</div>
      </div>
      <div class="form-group">
        <label>Dein Name (f&uuml;r Verlauf)</label>
        <input type="text" id="syncUser" placeholder="z.B. Benjamin" value="${escapeHtml(syncConfig.userName||'')}" maxlength="40">
        <div class="hint">Wird im Verlaufs-Tab des Sheets protokolliert</div>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:13px;color:#222">
          <input type="checkbox" id="syncAuto" ${syncConfig.autoSync?'checked':''} style="width:auto"> Automatisch nach jeder &Auml;nderung synchronisieren
        </label>
      </div>
      <div class="row" style="margin-top:14px">
        <button class="btn btn-sec" onclick="ui.showSettings()">Zur&uuml;ck</button>
        <button class="btn" onclick="ui.saveSyncSettings()">Speichern &amp; Verbinden</button>
      </div>
      ${syncConfig.url ? `<button class="btn btn-sec btn-block" style="margin-top:10px;color:#c33;border-color:#fcc" onclick="ui.disconnectSync()">Verbindung trennen</button>` : ''}
    `;
    ui.openModal();
  },
  async saveSyncSettings(){
    const url = $('#syncUrl').value.trim();
    const token = $('#syncToken').value.trim();
    const userName = $('#syncUser').value.trim();
    const autoSync = $('#syncAuto').checked;
    if(!url || !token){ toast('URL und Token sind Pflichtfelder'); return; }
    if(!/^https:\/\/script\.google\.com\//.test(url)){
      toast('URL muss mit https://script.google.com/ beginnen'); return;
    }
    const wasNew = !syncConfig.url;
    syncConfig = {url, token, userName, autoSync};
    saveSyncConfig();
    ui.closeModal();
    toast('Verbinde...');
    // Beim ersten Verbinden den Nutzer fragen, welche Richtung
    if(wasNew && (state.members.length>0 || Object.keys(state.attendance).length>0)){
      // Lokale Daten vorhanden - fragen
      setTimeout(()=>ui.showInitialSyncChoice(), 200);
    } else {
      await ui.sync(false);
    }
  },
  showInitialSyncChoice(){
    $('#modal-content').innerHTML = `
      <h3>Erstmaliger Sync</h3>
      <p>Du hast bereits lokale Daten und verbindest dich mit der Cloud. Was soll passieren?</p>
      <button class="btn btn-block" onclick="ui.initialSync('push')">&#9650; Lokale Daten in Cloud hochladen</button>
      <div class="muted" style="font-size:11px;margin-bottom:14px">Verwende dies, wenn ihr neu startet und du der erste bist.</div>
      <button class="btn btn-sec btn-block" onclick="ui.initialSync('pull')">&#9660; Cloud-Daten herunterladen (lokal &uuml;berschreiben)</button>
      <div class="muted" style="font-size:11px;margin-bottom:14px">Verwende dies, wenn jemand anders bereits Daten hochgeladen hat.</div>
      <div class="row" style="margin-top:14px">
        <button class="btn btn-sec" onclick="ui.closeModal()">Sp&auml;ter entscheiden</button>
      </div>`;
    ui.openModal();
  },
  async initialSync(direction){
    ui.closeModal();
    if(direction==='push'){
      // Alle lokalen Daten als Operationen queuen
      pendingOps = [];
      state.members.forEach(m=>pendingOps.push({op:'addMember', id:m.id, name:m.name}));
      Object.keys(state.attendance).forEach(matchId=>{
        pendingOps.push({op:'setAttendance', matchId, memberIds:state.attendance[matchId]});
      });
      savePending();
      await ui.sync(false);
    } else {
      // Nur Pull - lokale Daten verwerfen
      pendingOps = [];
      savePending();
      await ui.sync(false);
    }
  },
  disconnectSync(){
    ui.confirm('Cloud-Sync wirklich trennen?<br><span class="muted">Lokale Daten bleiben erhalten. Du kannst dich sp&auml;ter wieder verbinden.</span>', ()=>{
      syncConfig = {url:'', token:'', userName:syncConfig.userName, autoSync:true};
      pendingOps = [];
      saveSyncConfig();
      savePending();
      lastSyncAt = null;
      try{ localStorage.removeItem('supporters_freudental_lastsync_v1'); }catch(e){}
      syncStatus = 'idle';
      ui.updateSyncIndicator();
      ui.closeModal();
      toast('Sync getrennt');
    });
  },
  async sync(silent){
    const a = activeSync();
    if(!a.url){
      if(!silent){
        ui.closeModal();
        ui.showSyncSettings();
      }
      return;
    }
    if(syncStatus==='syncing') return;
    syncStatus = 'syncing';
    ui.updateSyncIndicator();
    try{
      let response;
      // Snapshot der Ops, die wir JETZT senden. memberIds tief kopieren, damit
      // spätere lokale Mutationen (Taps während fetch läuft) den gesendeten
      // Payload nicht verfälschen.
      const ops = pendingOps.map(op => Object.assign({}, op, op.memberIds ? {memberIds: op.memberIds.slice()} : {}));
      const opsCount = ops.length;
      if(opsCount>0){
        response = await fetch(a.url, {
          method:'POST',
          body:JSON.stringify({token:a.token, userName:syncConfig.userName||state.myMemberId||'unbekannt', operations:ops}),
          headers:{'Content-Type':'text/plain;charset=utf-8'},
          redirect:'follow'
        });
      } else {
        response = await fetch(a.url + (a.url.indexOf('?')>=0?'&':'?') + 'token=' + encodeURIComponent(a.token), {redirect:'follow'});
      }
      if(!response.ok) throw new Error('HTTP ' + response.status);
      const data = await response.json();
      if(!data.ok) throw new Error(data.error || 'Unbekannter Fehler');
      // Server-State übernehmen
      state.members = data.data.members || [];
      state.attendance = data.data.attendance || {};
      // Nur die Ops verwerfen, die wir wirklich gesendet haben - in der Zwischenzeit
      // können durch User-Taps neue Ops dazugekommen sein.
      pendingOps.splice(0, opsCount);
      // Diese noch nicht gesendeten Ops auf den frischen Server-State anwenden,
      // damit die UI nicht zwischen Tap und Sync-Antwort zurückspringt.
      pendingOps.forEach(applyOpLocally);
      saveState();
      savePending();
      // Falls die Cloud noch alte IDs ohne Saison-Prefix enthält
      migrateAttendanceIds();
      lastSyncAt = new Date();
      try{ localStorage.setItem('supporters_freudental_lastsync_v1', lastSyncAt.toISOString()); }catch(e){}
      syncStatus = 'ok';
      lastSyncError = '';
      if(!silent && pendingOps.length===0) toast('Synchronisiert &#10003;');
      // Aktive Seite neu rendern - Header auch, da im Member-Modus der eigene
      // Name erst nach dem Pull bekannt ist
      ui.renderHeaderSeason();
      const active = document.querySelector('.page.active');
      if(active){
        const name = active.id.replace('page-','');
        if(name==='match-detail') ui.renderAttendance(); else ui.showPage(name);
      }
      // Wenn während des Syncs neue Änderungen aufgelaufen sind: gleich erneut senden.
      if(pendingOps.length > 0){
        clearTimeout(syncDebounceTimer);
        syncDebounceTimer = setTimeout(()=>ui.sync(true), 150);
      }
    }catch(err){
      syncStatus = 'error';
      lastSyncError = err.message || String(err);
      if(!silent) toast('Sync-Fehler: ' + lastSyncError);
      console.error('Sync error', err);
    }finally{
      ui.updateSyncIndicator();
    }
  },
  updateSyncIndicator(){
    const pill = $('#syncPill');
    const txt = $('#syncText');
    const a = activeSync();
    if(!a.url){
      pill.className = 'sync-pill';
      txt.textContent = 'Nicht verbunden';
      return;
    }
    pill.className = 'sync-pill ' + (syncStatus==='ok'?'ok':syncStatus==='syncing'?'syncing':syncStatus==='error'?'error':'offline');
    const pendCnt = pendingOps.length;
    if(syncStatus==='syncing') txt.textContent = 'Synchronisiere...';
    else if(syncStatus==='error') txt.textContent = 'Fehler - tippen';
    else if(pendCnt>0) txt.textContent = pendCnt + ' offen - tippen';
    else if(lastSyncAt){
      const diff = Math.round((Date.now()-lastSyncAt.getTime())/60000);
      if(diff<1) txt.textContent = 'Synchron';
      else if(diff<60) txt.textContent = 'Sync vor ' + diff + ' Min';
      else txt.textContent = 'Sync vor ' + Math.round(diff/60) + ' Std';
    }
    else txt.textContent = 'Verbunden';
  },
  exportData(){
    const data = JSON.stringify({version:1, exportedAt:new Date().toISOString(), members:state.members, attendance:state.attendance}, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'supporters-freudental-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('Export heruntergeladen');
  },
  importData(){
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.json,application/json';
    inp.onchange = e=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev=>{
        try{
          const data = JSON.parse(ev.target.result);
          if(!data.members || !data.attendance) throw new Error('invalid');
          ui.confirm('Aktuelle Daten werden &uuml;berschrieben. Fortfahren?', ()=>{
            state.members = data.members;
            state.attendance = data.attendance;
            saveState();
            ui.closeModal();
            ui.showPage('dashboard');
            toast('Import erfolgreich');
          });
        }catch(err){toast('Datei ung&uuml;ltig')}
      };
      reader.readAsText(file);
    };
    inp.click();
  },
  exportCsv(){
    const rank = ui.computeRanking('all');
    const rankH = ui.computeRanking('H');
    const rankA = ui.computeRanking('A');
    const hMap = {}, aMap = {};
    rankH.forEach(r=>hMap[r.id]=r);
    rankA.forEach(r=>aMap[r.id]=r);
    const lines = ['Name;Heimspiele;Auswärtsspiele;Gesamt;Quote in %'];
    rank.forEach(r=>{
      lines.push([r.name, hMap[r.id]?.total||0, aMap[r.id]?.total||0, r.total, r.quota].join(';'));
    });
    const blob = new Blob(['﻿' + lines.join('\n')], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'supporters-statistik-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    toast('CSV heruntergeladen');
  },
  clearAll(){
    ui.confirm('<strong>Wirklich alle Daten l&ouml;schen?</strong><br>Mitglieder und alle Anwesenheits-Eintr&auml;ge gehen verloren.<br><br>Tipp: Vorher Export machen!', ()=>{
      state.members = [];
      state.attendance = {};
      saveState();
      ui.closeModal();
      ui.showPage('dashboard');
      toast('Alle Daten gel&ouml;scht');
    });
  },
  confirm(html, onYes){
    $('#modal-content').innerHTML = `
      <h3>Best&auml;tigen</h3>
      <p>${html}</p>
      <div class="row">
        <button class="btn btn-sec" onclick="ui.closeModal()">Abbrechen</button>
        <button class="btn" id="modalConfirmBtn">OK</button>
      </div>`;
    $('#modalConfirmBtn').onclick = ()=>{ui.closeModal(); onYes();};
    ui.openModal();
  },
  openModal(){$('#modal-overlay').classList.add('show')},
  closeModal(){$('#modal-overlay').classList.remove('show')},
  installApp(){
    if(window._deferredPrompt){
      window._deferredPrompt.prompt();
      window._deferredPrompt = null;
      $('#installBanner').classList.remove('show');
    } else {
      ui.confirm('Auf Android: Browser-Men&uuml; (drei Punkte) &rarr; "Zum Startbildschirm hinzuf&uuml;gen".<br><br>Auf iOS: Teilen-Symbol &rarr; "Zum Home-Bildschirm".', ()=>{});
    }
  }
};

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}

// === EVENTS ===
$$('.tabbar button').forEach(b=>b.addEventListener('click',()=>ui.showPage(b.dataset.page)));
$('#seasonSelect').addEventListener('change', e=>setSeason(e.target.value));
$('#seasonSelectStats').addEventListener('change', e=>setSeason(e.target.value));
$('#newMemberName').addEventListener('keydown',e=>{if(e.key==='Enter')ui.addMember()});
$('#modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')ui.closeModal()});

// PWA-Installation: Android (beforeinstallprompt) + iOS (manueller Hinweis)
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  window._deferredPrompt = e;
  if(!isStandalone()) $('#installBanner').classList.add('show');
});

// iOS-Erkennung
function isIOS(){return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream}
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

// Auf iOS: Install-Banner nach kurzer Verzögerung anzeigen, wenn nicht installiert
if(isIOS() && !isStandalone() && !localStorage.getItem('install_dismissed')){
  setTimeout(()=>{
    const b = $('#installBanner');
    b.classList.add('show');
    const labelSpan = b.querySelector('span:nth-of-type(2)');
    if(labelSpan) labelSpan.textContent = 'Tippe unten auf Teilen und "Zum Home-Bildschirm" für Vollbild-Modus';
    const btn = b.querySelector('button');
    if(btn){
      btn.textContent = 'OK';
      btn.onclick = ()=>{localStorage.setItem('install_dismissed','1'); b.classList.remove('show')};
    }
  }, 2000);
}

// Service Worker registrieren für Offline-Support
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(err=>console.log('SW-Fehler:', err));
  });
}

// In Standalone-Modus: externe Links im Browser öffnen (sonst springt iOS aus der App)
document.addEventListener('click', e=>{
  if(!isStandalone()) return;
  const a = e.target.closest('a');
  if(a && a.href && a.target !== '_self' && !a.href.startsWith(location.origin)){
    e.preventDefault();
    window.open(a.href, '_blank');
  }
});

// === INIT ===
async function init(){
  captureMemberAuthFromUrl(); // URL #u=...&t=...&s=... auswerten und persistieren
  loadMemberAuth();
  loadState();
  detectRole();
  await loadFixtures();
  ui.applyRoleClass();
  ui.renderSeasonSelects();
  ui.renderHeaderSeason();
  ui.renderFilterChips();
  ui.renderStatChips();
  ui.showPage('dashboard');
  ui.updateSyncIndicator();
  const a = activeSync();
  if(a.url){
    setTimeout(()=>ui.sync(true), 800);
  }
}
init();
// Online/Offline-Erkennung
window.addEventListener('online', ()=>{ if(activeSync().url) ui.sync(true); });
window.addEventListener('offline', ()=>{
  if(activeSync().url){ syncStatus='offline'; ui.updateSyncIndicator(); }
});
// Beim Wiederfokussieren der App synchronisieren
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden && activeSync().url){
    if(!lastSyncAt || (Date.now()-lastSyncAt.getTime())>30000){
      ui.sync(true);
    }
  }
});
</script>
